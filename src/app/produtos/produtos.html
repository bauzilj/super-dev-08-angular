<div class="max-w-md mx-auto mt-10 p-6 rounded-2xl bg-gradient-to-br from-white via-gray-50 to-gray-100 shadow-xl border border-gray-200">

  <h2 class="text-2xl font-bold text-gray-800 mb-4 text-center">
    🛒 Lista de Produtos
  </h2>

  <ul class="space-y-3">
    @if(produtos.length === 0){
      <span class="text-gray-400 italic text-center block">
        Nenhum produto cadastrado
      </span>
    } @else{
      @for(produto of produtos; let i = $index; track produto){
        <li class="group flex items-center justify-between bg-white border border-gray-200 px-4 py-3 rounded-xl shadow-sm hover:shadow-md hover:-translate-y-0.5 transition-all duration-300">

         
          <div class="flex flex-col">
            <span class="text-gray-800 font-semibold">
              {{produto.nome}}
            </span>
            <span class="text-sm text-gray-500">
              Qtd: {{produto.quantidade}} • R$ {{produto.valor.toFixed(2)}}
            </span>
          </div>

        
          <div class="flex gap-2 opacity-70 group-hover:opacity-100 transition">
            
           
            <button 
              class="bg-yellow-400 hover:bg-yellow-500 text-black px-3 py-1 rounded-lg shadow-sm hover:scale-110 transition-all duration-200"
              (click)="preencherCampoParaEditar(produto)">
              ✏️
            </button>

           
            <button 
              class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded-lg shadow-sm hover:scale-110 transition-all duration-200"
              (click)="apagar(produto)">
              🗑️
            </button>

          </div>
        </li>
      }
    }
  </ul>

 
  <div class="mt-6 flex flex-col gap-3">
    
    
    <label class="text-gray-600 text-sm font-medium">
      Nome do produto
    </label>

    <input 
      type="text"
      class="bg-white border border-gray-300 text-gray-700 placeholder-gray-400 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-teal-400 focus:border-transparent transition"
      placeholder="Digite um produto..."
      [(ngModel)]="produto.nome">

    
    <div class="grid grid-cols-2 gap-3">

      
      <div>
        <label class="text-gray-600 text-sm font-medium">
          Quantidade
        </label>
        <input 
          type="number"
          class="w-full bg-white border border-gray-300 text-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-teal-400"
          [(ngModel)]="produto.quantidade">
      </div>

      
      <div>
        <label class="text-gray-600 text-sm font-medium">
          Valor (R$)
        </label>
        <input 
          type="number"
          step="0.01"
          class="w-full bg-white border border-gray-300 text-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-teal-400"
          [(ngModel)]="produto.valor">
      </div>

    </div>

    
    <button 
      class="mt-2 bg-gradient-to-r from-teal-400 to-cyan-500 hover:from-teal-500 hover:to-cyan-600 text-white font-semibold py-2 rounded-lg shadow-md hover:scale-[1.03] transition-all duration-300"
      (click)="salvar()">
      Salvar Produto
    </button>

  </div>

</div>
