<div class="main-content">
    <div class="form-card">
        <h1>Formulário do imóvel</h1>

        <div class="form-group">
            <label for="valor-do-imovel">Valor do imóvel</label>
            <input type="number" [(ngModel)]="valor" id="valor-do-imovel">
        </div>

        <div class="form-group">
            <label for="qtd-metro-quadrado">Quantidade de metros quadrados</label>
            <input type="number" [(ngModel)]="quantidade" id="qtd-metro-quadrado">
        </div>

        <div>
            <button type="button" (click)="valorImovel()">Calcular valor do metro quadrado</button>
        </div>

         @if(valorDoMetroQuadrado !== null){
            <div class="form-group">
                <p class="result-label">Valor do metro quadrado</p>
                <p class="result-value">{{valorDoMetroQuadrado.toFixed(2).replace(".", ",")}}</p>
            </div>
        }
    </div>
</div>
